<!-- templates/partials/transaction_row.html -->
<li class="tx-row flex items-start sm:items-center justify-between gap-3"
    style="padding:10px 12px; background:var(--bg-card); border:1px solid var(--border-subtle); {{ 'border-left:3px solid var(--gold);' if tx.is_recurring else '' }} border-radius:10px;"
    data-id="{{ tx.id }}"
    data-date="{{ tx.timestamp.strftime('%Y-%m-%d') }}">

    <form method="POST"
            action="{{ url_for('finance.update_transaction', transaction_id=tx.id) }}"
            class="flex-grow flex flex-col sm:flex-row sm:items-center gap-2 min-w-0">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <span class="w-full sm:flex-1 min-w-0">
            <span contenteditable="true"
                    data-id="{{ tx.id }}"
                    class="tx-desc block w-full break-words"
                    style="background:transparent; outline:none; font-size:14px; color:var(--text-primary);">
                {{ tx.description }}
            </span>
            <div class="tx-meta-row" style="font-size:11px; color:var(--text-secondary); margin-top:2px; display:flex; align-items:center; gap:6px;">
                <span class="tx-date-label">{{ tx.timestamp.strftime('%b %d, %Y') }}</span>
                {% if tx.is_recurring %}
                    <span class="tx-recurring-label" style="color:var(--gold);">&middot; &#8635; recurring</span>
                {% endif %}
            </div>
        </span>

        <span contenteditable="true"
                data-id="{{ tx.id }}"
                data-type="{{ tx.type }}"
                data-money-value="{{ tx.amount }}"
                class="tx-amount w-full sm:w-[130px] sm:text-right whitespace-nowrap"
                style="background:transparent; outline:none; font-size:14px; font-family:'JetBrains Mono',monospace;">
            {{ "%.2f"|format(tx.amount) }}
        </span>

        <input
            type="date"
            class="tx-date min-w-[130px] sm:w-[140px] h-9 field-input"
            style="font-size:13px; padding:0 8px;"
            data-id="{{ tx.id }}"
            value="{{ tx.timestamp.strftime('%Y-%m-%d') }}"
        >

        <select data-id="{{ tx.id }}"
                class="tx-type min-w-[96px] sm:w-[105px] h-9 field-input"
                style="font-size:13px; padding:0 8px;">
            <option value="income" {% if tx.type == "income" %}selected{% endif %}>Income</option>
            <option value="expense" {% if tx.type == "expense" %}selected{% endif %}>Expense</option>
        </select>

        <button
            type="button"
            class="tx-recurring-toggle {{ 'tx-recurring-on' if tx.is_recurring }}"
            data-id="{{ tx.id }}"
            aria-pressed="{{ 'true' if tx.is_recurring else 'false' }}"
            title="{{ 'Recurring — click to turn off' if tx.is_recurring else 'Mark as recurring' }}"
        >{{ '↻' if tx.is_recurring else '' }}</button>

        <button type="submit" class="hidden">Save</button>
    </form>

    <form class="tx-delete-form"
            method="POST"
            action="{{ url_for('finance.delete_transaction', transaction_id=tx.id) }}">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <button type="submit"
                style="background:none; border:none; color:var(--text-muted); font-size:16px; line-height:1; cursor:pointer;"
                title="Delete"
                aria-label="Delete transaction">
            🗑️
        </button>
    </form>
</li>
