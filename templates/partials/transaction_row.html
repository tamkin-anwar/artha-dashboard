<!-- templates/partials/transaction_row.html -->
<li class="tx-row flex items-start sm:items-center justify-between gap-3 px-3 py-2.5 bg-white dark:bg-gray-700 rounded-lg border border-gray-200/70 dark:border-gray-600/60 shadow-sm"
    data-id="{{ tx.id }}">

    <button type="button"
            class="tx-handle mt-1 sm:mt-0 cursor-move select-none text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-base leading-none"
            title="Drag to reorder"
            aria-label="Drag to reorder">
        ☰
    </button>

    <form method="POST"
            action="{{ url_for('update_transaction', transaction_id=tx.id) }}"
            class="flex-grow flex flex-col sm:flex-row sm:items-center gap-2 min-w-0">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <span contenteditable="true"
                data-id="{{ tx.id }}"
                class="tx-desc w-full sm:flex-1 min-w-0 bg-transparent outline-none text-sm text-black dark:text-white break-words">
            {{ tx.description }}
        </span>

        <span contenteditable="true"
                data-id="{{ tx.id }}"
                data-type="{{ tx.type }}"
                data-money-value="{{ tx.amount }}"
                class="tx-amount w-full sm:w-[130px] bg-transparent outline-none text-sm sm:text-right text-black dark:text-white whitespace-nowrap">
            {{ "%.2f"|format(tx.amount) }}
        </span>

        <select data-id="{{ tx.id }}"
                class="tx-type min-w-[96px] sm:w-[105px] h-9 bg-white dark:bg-gray-900 text-black dark:text-white text-sm border border-gray-300 dark:border-gray-700 rounded px-2">
            <option value="income" {% if tx.type == "income" %}selected{% endif %}>Income</option>
            <option value="expense" {% if tx.type == "expense" %}selected{% endif %}>Expense</option>
        </select>

        <button type="submit" class="hidden">Save</button>
    </form>

    <form class="tx-delete-form"
            method="POST"
            action="{{ url_for('delete_transaction', transaction_id=tx.id) }}">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <button type="submit"
                class="text-red-500 hover:text-red-700 text-lg leading-none"
                title="Delete"
                aria-label="Delete transaction">
            🗑️
        </button>
    </form>
</li>
