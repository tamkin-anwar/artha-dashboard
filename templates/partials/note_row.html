<li
    class="note-row glass-card"
    data-id="{{ note.id }}"
    style="padding:20px; position:relative;"
>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <button
            type="button"
            class="note-handle"
            style="background:none; border:none; cursor:grab; color:var(--text-muted); font-size:14px; padding:0;"
            title="Drag to reorder"
            aria-label="Drag to reorder"
        >☰</button>

        <form action="{{ url_for('notes.delete_note', note_id=note.id) }}" method="POST" class="note-delete-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button
                type="submit"
                style="background:none; border:none; color:var(--text-muted); font-size:16px; line-height:1; cursor:pointer;"
                title="Delete"
                aria-label="Delete note"
            >🗑️</button>
        </form>
    </div>

    <div
        contenteditable="true"
        data-note-id="{{ note.id }}"
        role="textbox"
        aria-multiline="true"
        tabindex="0"
        aria-label="Edit note"
        spellcheck="true"
        class="editable-note"
        style="font-weight:600; color:var(--text-primary); outline:none; border-radius:6px; padding:2px;"
    >{{ note.content }}</div>
</li>
