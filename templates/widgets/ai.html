<div
    class="h-full flex flex-col"
    id="artha-ai-widget"
    data-csrf="{{ csrf_token_value }}"
>
    <!-- Header -->
    <div class="flex items-center justify-between mb-3">
        <div class="flex items-center space-x-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M0 11.981C.004 5.612 4.965.403 11.233.002L11.268 0v11.981c0 .139.038.269.105.379l-.002-.003l5.989 10.378A11.831 11.831 0 0 1 12 23.999c-6.627 0-12-5.373-12-12v-.018v.001zm13.318.752H24a12.006 12.006 0 0 1-5.291 9.231l-.043.027zm-.548-1.503V0c6.04.388 10.842 5.19 11.229 11.194l.002.035z"/>
            </svg>
            <h2 class="font-semibold text-gray-800 dark:text-gray-100 text-sm">Artha AI</h2>
        </div>
        <div class="flex items-center space-x-2">
            <button
                id="ai-insights-btn"
                type="button"
                class="px-2.5 py-1 text-xs font-medium rounded-lg bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/50 transition disabled:opacity-40 disabled:cursor-not-allowed"
            >
                ✦ Insights
            </button>
            <button
                id="ai-clear-btn"
                type="button"
                class="px-2.5 py-1 text-xs font-medium rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
                title="Clear conversation"
            >
                Clear
            </button>
        </div>
    </div>

    <!-- Message thread -->
    <div
        id="ai-messages"
        class="overflow-y-auto space-y-2 mb-3"
        style="height: 220px;"
        aria-live="polite"
        aria-label="AI conversation"
    >
        <!-- Empty state -->
        <div id="ai-empty-state" class="flex flex-col items-center justify-center h-full text-center">
            <p class="text-gray-400 dark:text-gray-500 text-sm">Ask me anything about your finances.</p>
            <p class="text-gray-300 dark:text-gray-600 text-xs mt-1">Or hit <span class="font-medium">✦ Insights</span> for an instant report.</p>
        </div>
    </div>

    <!-- Input -->
    <div class="flex items-center space-x-2 mt-auto">
        <input
            id="ai-input"
            type="text"
            placeholder="Ask Artha AI..."
            maxlength="4000"
            autocomplete="off"
            class="flex-1 px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 disabled:opacity-50"
            aria-label="Message to Artha AI"
        />
        <button
            id="ai-send-btn"
            type="button"
            class="px-3 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-medium transition disabled:opacity-40 disabled:cursor-not-allowed"
            aria-label="Send message"
        >
            Send
        </button>
    </div>
</div>
