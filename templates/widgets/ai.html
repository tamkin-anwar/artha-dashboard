<style>
    /* ai.js is shared with the full /ai page and creates elements using
       these class names (.ai-row, .ai-bubble-*, .ai-orb, .ai-word, ...).
       This widget needs its own (compact) copies of that styling since
       widgets/ai.html doesn't share a <style> block with templates/ai.html. */
    #artha-ai-widget .ai-row { display: flex; }
    #artha-ai-widget .ai-row.user { justify-content: flex-end; }
    #artha-ai-widget .ai-row.assistant { justify-content: flex-start; align-items: flex-start; gap: 8px; }

    #artha-ai-widget .ai-bubble-user {
        max-width: 80%;
        background: linear-gradient(135deg, var(--gold-dim), rgba(212,168,67,0.08));
        border: 1px solid rgba(212,168,67,0.2);
        border-radius: 14px 14px 4px 14px;
        color: var(--text-primary);
        font-size: 13px;
        padding: 8px 12px;
    }

    #artha-ai-widget .ai-avatar-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #f0d78a, var(--gold));
        flex-shrink: 0;
        margin-top: 4px;
    }

    #artha-ai-widget .ai-bubble-assistant {
        max-width: 85%;
        color: var(--text-primary);
        font-size: 13px;
        line-height: 1.6;
        animation: ai-widget-fade-in 0.3s ease-out;
    }
    #artha-ai-widget .ai-bubble-assistant strong { color: var(--gold); }

    @keyframes ai-widget-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    #artha-ai-widget .ai-word {
        display: inline-block;
        opacity: 0;
        animation: ai-widget-word-in 0.35s ease-out forwards;
    }
    @keyframes ai-widget-word-in {
        from { opacity: 0; transform: translateY(2px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Orb — only appears via ai.js's shared "Clear" empty-state markup,
       or as the mini thinking/speaking loading indicator. Scoped down
       from the full page's 120px version to fit this compact widget. */
    #artha-ai-widget .ai-orb {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%,
            rgba(212, 168, 67, 0.6),
            rgba(30, 58, 95, 0.8),
            rgba(10, 14, 23, 0.95));
        box-shadow:
            0 0 20px rgba(212, 168, 67, 0.2),
            0 0 40px rgba(30, 58, 95, 0.3),
            inset 0 0 20px rgba(212, 168, 67, 0.1);
        animation: ai-widget-orb-breathe 4s ease-in-out infinite;
        filter: blur(0.5px);
    }
    @keyframes ai-widget-orb-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
    }
    #artha-ai-widget .ai-orb.thinking {
        animation: ai-widget-orb-think 1.2s ease-in-out infinite;
        background: radial-gradient(circle at 40% 40%,
            rgba(34, 197, 94, 0.5),
            rgba(212, 168, 67, 0.6),
            rgba(30, 58, 95, 0.9));
    }
    @keyframes ai-widget-orb-think {
        0%, 100% { transform: scale(1) rotate(0deg); }
        25% { transform: scale(1.12) rotate(2deg); }
        75% { transform: scale(1.06) rotate(-2deg); }
    }
    #artha-ai-widget .ai-orb.speaking {
        animation: ai-widget-orb-speak 0.6s ease-out;
    }
    @keyframes ai-widget-orb-speak {
        0% { transform: scale(1.15); }
        60% { transform: scale(0.95); }
        100% { transform: scale(1); }
    }
    #artha-ai-widget .ai-orb.ai-orb-mini {
        width: 28px;
        height: 28px;
    }

    /* Suggestion chips only appear via the shared "Clear" empty-state
       markup — too cramped for this widget, and "Open full chat" above
       already covers that need, so hide them here. */
    #artha-ai-widget .ai-chip { display: none; }

    #artha-ai-widget .ai-insights-pill {
        background: none;
        border: none;
        color: var(--gold);
        font-size: 12px;
        font-weight: 500;
        padding: 6px 10px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s ease;
    }
    #artha-ai-widget .ai-insights-pill:hover { background: var(--gold-dim); }

    #artha-ai-widget .ai-widget-input-bar {
        background: rgba(14,17,24,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--border-subtle);
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    #artha-ai-widget .ai-widget-input {
        flex: 1;
        min-width: 0;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text-primary);
        font-size: 14px;
        padding: 8px 4px;
        font-family: 'Inter', sans-serif;
    }
    #artha-ai-widget .ai-widget-input::placeholder { color: var(--text-muted); }

    #artha-ai-widget .ai-widget-send-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--gold);
        color: #000;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: transform 0.12s ease;
    }
    #artha-ai-widget .ai-widget-send-btn:hover { transform: scale(1.05); }
    #artha-ai-widget .ai-widget-send-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
</style>

<div
    class="glass-card"
    style="padding:0; overflow:hidden; border-left:2px solid var(--gold); display:flex; flex-direction:column;"
    id="artha-ai-widget"
    data-csrf="{{ csrf_token() }}"
>
    <div style="display:flex; align-items:center; justify-content:space-between; padding:20px 20px 0;">
        <span class="eyebrow">AI Insight</span>

        <div class="flex items-center space-x-2">
            <a href="{{ url_for('ai.page') }}" style="font-size:12px; color:var(--gold); text-decoration:none; margin-right:4px;">
                Open full chat →
            </a>
            <button
                id="ai-insights-btn"
                type="button"
                class="ai-insights-pill"
            >
                ✦ Insights
            </button>
            <button
                id="ai-clear-btn"
                type="button"
                style="padding:6px 10px; font-size:12px; font-weight:500; background:none; border:none; color:var(--text-secondary); border-radius:8px; cursor:pointer;"
                title="Clear conversation"
            >
                Clear
            </button>
        </div>
    </div>

    <!-- Message thread -->
    <div
        id="ai-messages"
        class="overflow-y-auto"
        style="height:220px; margin:16px 0 0; padding:14px 16px; background:var(--bg-sidebar); display:flex; flex-direction:column; gap:10px;"
        aria-live="polite"
        aria-label="AI conversation"
    >
        <div id="ai-empty-state" style="flex:1; display:flex; align-items:center; justify-content:center; text-align:center;">
            <p style="color:var(--text-muted); font-size:13px; margin:0;">Ask me anything about your finances</p>
        </div>
    </div>

    <p style="margin:10px 20px 0; font-size:12px; color:var(--text-secondary);">
        Powered by Claude — grounded in your real transaction data.
    </p>

    <!-- Input -->
    <div class="ai-widget-input-bar" style="margin-top:14px;">
        <input
            id="ai-input"
            type="text"
            placeholder="Ask Artha AI..."
            maxlength="4000"
            autocomplete="off"
            class="ai-widget-input"
        />
        <button
            id="ai-send-btn"
            type="button"
            class="ai-widget-send-btn"
            aria-label="Send message"
        >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </button>
    </div>
</div>
