<div
    class="glass-card"
    style="padding:24px; border-left:2px solid var(--gold);"
    id="artha-ai-widget"
    data-csrf="{{ csrf_token() }}"
>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <span class="eyebrow">AI Insight</span>

        <div class="flex items-center space-x-2">
            <a href="{{ url_for('ai.page') }}" style="font-size:12px; color:var(--gold); text-decoration:none; margin-right:4px;">
                Open full chat →
            </a>
            <button
                id="ai-insights-btn"
                type="button"
                class="btn-secondary"
                style="padding:6px 10px; font-size:12px; font-weight:500;"
            >
                ✦ Insights
            </button>
            <button
                id="ai-clear-btn"
                type="button"
                style="padding:6px 10px; font-size:12px; font-weight:500; background:none; border:none; color:var(--text-secondary); border-radius:8px;"
                title="Clear conversation"
            >
                Clear
            </button>
        </div>
    </div>

    <!-- Message thread -->
    <div
        id="ai-messages"
        class="overflow-y-auto space-y-2"
        style="height: 220px; margin-bottom:16px; border-radius:10px; background:var(--bg-sidebar); padding:8px;"
        aria-live="polite"
        aria-label="AI conversation"
    >
        <div id="ai-empty-state" class="flex flex-col items-center justify-center h-full text-center">
            <p class="text-gray-500 dark:text-gray-300 text-sm">Ask me anything about your finances.</p>
            <p class="text-gray-400 dark:text-gray-400 text-xs mt-1">Or hit <span class="font-medium">✦ Insights</span> for an instant report.</p>
        </div>
    </div>

    <!-- Input -->
    <div class="flex items-center space-x-2">
        <input
            id="ai-input"
            type="text"
            placeholder="Ask Artha AI..."
            maxlength="4000"
            autocomplete="off"
            class="field-input w-full min-w-0 h-11 text-sm"
        />
        <button
            id="ai-send-btn"
            type="button"
            class="btn-primary h-11 px-5 text-sm whitespace-nowrap"
            aria-label="Send message"
        >
            Send
        </button>
    </div>

    <p style="margin-top:10px; font-size:13px; color:var(--text-secondary);">
        Powered by Claude — grounded in your real transaction data.
    </p>
</div>
