<div
    class="bg-gray-100 dark:bg-gray-700 rounded-xl p-6 shadow"
    id="artha-ai-widget"
    data-csrf="{{ csrf_token() }}"
>
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">🤖 Artha AI</h2>

        <div class="flex items-center space-x-2">
            <button
                id="ai-insights-btn"
                type="button"
                class="px-2.5 py-1 text-xs font-medium rounded-lg bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 hover:bg-blue-200 dark:hover:bg-blue-900/60 transition disabled:opacity-40 disabled:cursor-not-allowed"
            >
                ✦ Insights
            </button>
            <button
                id="ai-clear-btn"
                type="button"
                class="px-2.5 py-1 text-xs font-medium rounded-lg text-gray-500 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition"
                title="Clear conversation"
            >
                Clear
            </button>
        </div>
    </div>

    <!-- Message thread -->
    <div
        id="ai-messages"
        class="overflow-y-auto space-y-2 mb-4 rounded-lg bg-white/60 dark:bg-gray-800/60 p-2"
        style="height: 220px;"
        aria-live="polite"
        aria-label="AI conversation"
    >
        <div id="ai-empty-state" class="flex flex-col items-center justify-center h-full text-center">
            <p class="text-gray-500 dark:text-gray-300 text-sm">Ask me anything about your finances.</p>
            <p class="text-gray-400 dark:text-gray-400 text-xs mt-1">Or hit <span class="font-medium">✦ Insights</span> for an instant report.</p>
        </div>
    </div>

    <!-- Input -->
    <div class="flex items-center space-x-2">
        <input
            id="ai-input"
            type="text"
            placeholder="Ask Artha AI..."
            maxlength="4000"
            autocomplete="off"
            class="w-full min-w-0 h-11 px-4 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-black dark:text-white text-sm placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/60 disabled:opacity-50"
            aria-label="Message to Artha AI"
        />
        <button
            id="ai-send-btn"
            type="button"
            class="h-11 px-5 rounded-lg bg-blue-600 text-white font-semibold text-sm hover:bg-blue-700 transition disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap"
            aria-label="Send message"
        >
            Send
        </button>
    </div>

    <p class="mt-2 text-sm text-gray-600 dark:text-gray-300">
        Powered by Claude — grounded in your real transaction data.
    </p>
</div>
