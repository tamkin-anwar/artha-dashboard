<div class="glass-card" style="padding:24px;">
    <span class="eyebrow" style="display:block; margin-bottom:16px;">Calendar</span>
    <div id="calendar" style="font-size:14px; background:var(--bg-sidebar); border:1px solid var(--border-subtle); border-radius:10px; overflow:hidden;" role="grid" aria-label="Calendar">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 16px; background:var(--bg-card);">
            <button id="prevMonth" style="font-size:16px; font-weight:700; background:none; border:none; color:var(--text-primary); cursor:pointer;" aria-label="Previous Month">&lt;</button>
            <div id="monthYear" style="font-size:15px; font-weight:600; color:var(--text-primary); font-family:'Fraunces',serif;" aria-live="polite" aria-atomic="true"></div>
            <button id="nextMonth" style="font-size:16px; font-weight:700; background:none; border:none; color:var(--text-primary); cursor:pointer;" aria-label="Next Month">&gt;</button>
        </div>
        <div class="grid grid-cols-7 text-center" style="font-weight:600; color:var(--text-secondary); border-top:1px solid var(--border-subtle); font-size:12px; padding:6px 0;">
            <div role="columnheader">Sun</div>
            <div role="columnheader">Mon</div>
            <div role="columnheader">Tue</div>
            <div role="columnheader">Wed</div>
            <div role="columnheader">Thu</div>
            <div role="columnheader">Fri</div>
            <div role="columnheader">Sat</div>
        </div>
        <div id="calendar-days" class="grid grid-cols-7 text-center" style="color:var(--text-primary);" role="rowgroup"></div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const daysContainer = document.getElementById("calendar-days");
    const monthYear = document.getElementById("monthYear");
    const prevBtn = document.getElementById("prevMonth");
    const nextBtn = document.getElementById("nextMonth");

    let currentDate = new Date();

    function renderCalendar(date) {
        daysContainer.innerHTML = "";
        const year = date.getFullYear();
        const month = date.getMonth();

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();

        const monthName = date.toLocaleString("default", { month: "long" });
        monthYear.textContent = `${monthName} ${year}`;

        // Empty cells for alignment
        for (let i = 0; i < firstDay; i++) {
        const emptyCell = document.createElement("div");
        emptyCell.setAttribute("role", "presentation");
        daysContainer.appendChild(emptyCell);
        }

        for (let day = 1; day <= lastDate; day++) {
        const dayCell = document.createElement("div");
        dayCell.textContent = day;
        dayCell.setAttribute("role", "gridcell");
        dayCell.className = "py-2";

        const today = new Date();
        const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();

        if (isToday) {
            dayCell.classList.add("calendar-today");
            dayCell.setAttribute("aria-current", "date");
        }
        daysContainer.appendChild(dayCell);
        }
    }

    prevBtn.addEventListener("click", () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar(currentDate);
    });

    nextBtn.addEventListener("click", () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar(currentDate);
    });

    renderCalendar(currentDate);
});
</script>
