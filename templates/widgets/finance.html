<div class="finance-tab glass-card" style="padding:24px;">
    <form
        method="POST"
        action="{{ url_for('finance.add_transaction') }}"
        class="grid grid-cols-1 sm:grid-cols-12 gap-2.5 items-center"
        style="margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border-subtle);"
        autocomplete="off"
    >
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <input
            type="text"
            name="description"
            placeholder="Description"
            required
            class="field-input w-full min-w-0 sm:col-span-4 h-11 text-sm"
        >

        <div class="relative w-full min-w-0 sm:col-span-3">
            <span
                class="absolute inset-y-0 left-0 pl-4 flex items-center h-11 text-sm"
                style="color:var(--text-muted);"
                data-currency-symbol
            >$</span>

            <input
                type="number"
                name="amount"
                placeholder="Amount"
                step="0.01"
                inputmode="decimal"
                required
                class="field-input w-full min-w-0 h-11 text-sm"
                style="padding-left:2.25rem;"
            >
        </div>

        <select
            name="type"
            required
            class="field-input w-full min-w-0 sm:col-span-3 h-11 text-sm"
        >
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <button
            type="submit"
            class="btn-primary w-full sm:col-span-2 h-11 px-5 text-sm flex items-center justify-center whitespace-nowrap"
        >
            Add
        </button>
    </form>

    <ul id="tx-list" class="space-y-3">
        {% for tx in transactions %}
            {% include "partials/transaction_row.html" %}
        {% else %}
            <li style="text-align:center; padding:24px 0; font-size:14px; color:var(--text-secondary);">
                No transactions yet.
            </li>
        {% endfor %}
    </ul>

    <div class="text-legend" style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border-subtle); font-size:14px; display:flex; flex-direction:column; gap:4px;">
        <p>💰 Income:
            <strong
                id="finance-income"
                class="finance-income"
                data-money-value="{{ income }}"
            >${{ "%.2f"|format(income) }}</strong>
            <span style="font-size:11px; color:var(--text-muted);">· This month</span>
        </p>

        <p>💸 Expense:
            <strong
                id="finance-expense"
                class="finance-expense"
                data-money-value="{{ expense }}"
            >${{ "%.2f"|format(expense) }}</strong>
            <span style="font-size:11px; color:var(--text-muted);">· This month</span>
        </p>

        <p>📊 Balance:
            <strong
                id="finance-balance"
                class="finance-balance"
                data-money-value="{{ balance }}"
            >${{ "%.2f"|format(balance) }}</strong>
            <span style="font-size:11px; color:var(--text-muted);">· This month</span>
        </p>
    </div>
</div>
