<div class="glass-card" style="padding:24px;">
    <span class="eyebrow" id="chart-title" style="display:block; margin-bottom:16px;">
        Income vs Expense
    </span>

    <div class="relative h-72">
        <canvas id="financeChart" class="absolute inset-0 w-full h-full block"></canvas>

        <div
            id="chart-center-label"
            class="absolute inset-0 flex items-center justify-center pointer-events-none"
            aria-hidden="true"
        >
            <div class="text-center leading-tight">
                <div
                    id="chart-center-title"
                    style="font-size:13px; font-weight:600; color:var(--text-secondary); font-family:'Inter',sans-serif;"
                >
                    Balance
                </div>
                <div
                    id="chart-center-value"
                    class="stat-number money-gold"
                    style="margin-top:4px; font-size:20px;"
                >
                    $0.00
                </div>
            </div>
        </div>
    </div>

    <p id="chart-text" class="chart-text" style="margin-top:12px; font-size:13px; color:var(--text-secondary);">
        This shows your income, expense, and current balance at a glance.
    </p>
</div>
