<!-- templates/widgets/notes.html -->
<div class="glass-card" style="padding:24px; margin-bottom:24px;">
    <form method="POST" action="{{ url_for('dashboard.index') }}" class="space-y-2">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <textarea
            name="note"
            rows="3"
            placeholder="Write a note..."
            class="field-input w-full"
            required
        ></textarea>

        <button type="submit" class="btn-primary w-full" style="padding:10px;">
            Add Note
        </button>
    </form>
</div>

<ul id="note-list" class="notes-masonry">
    {% for note in notes %}
        {% include "partials/note_row.html" %}
    {% else %}
    <li style="text-align:center; padding:32px 0; font-size:14px; color:var(--text-secondary);">
        No notes yet.
    </li>
    {% endfor %}
</ul>
