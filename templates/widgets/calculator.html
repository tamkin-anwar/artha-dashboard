<div class="glass-card" style="padding:24px;">
    <span class="eyebrow" style="display:block; margin-bottom:16px;">Calculator</span>

    <!-- Display -->
    <input type="text" id="calc-display"
            class="field-input w-full mb-4"
            style="font-family:'JetBrains Mono',monospace; text-align:right; font-size:18px;"
            placeholder="0" readonly />

    <!-- Buttons Grid -->
    <div class="grid grid-cols-4 gap-2">
        <button class="calc-btn">7</button>
        <button class="calc-btn">8</button>
        <button class="calc-btn">9</button>
        <button class="calc-btn">/</button>

        <button class="calc-btn">4</button>
        <button class="calc-btn">5</button>
        <button class="calc-btn">6</button>
        <button class="calc-btn">*</button>

        <button class="calc-btn">1</button>
        <button class="calc-btn">2</button>
        <button class="calc-btn">3</button>
        <button class="calc-btn">-</button>

        <button class="calc-btn">0</button>
        <button class="calc-btn">.</button>
        <button id="calc-equals" class="calc-btn calc-btn-equals">=</button>
        <button class="calc-btn">+</button>

        <button class="calc-btn calc-btn-clear col-span-4" style="margin-top:8px;">C</button>
    </div>

    <p style="margin-top:12px; font-size:13px; color:var(--text-secondary);">
        Click buttons or use keyboard while focused on the display.
    </p>
</div>
