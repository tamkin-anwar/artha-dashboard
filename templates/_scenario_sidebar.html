<aside class="w-full lg:w-[280px] shrink-0 lg:sticky lg:top-6 lg:self-start lg:max-h-[calc(100vh-3rem)] lg:overflow-y-auto" style="background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:16px; padding:16px;">
    {% if scenarios %}
        <div class="space-y-2">
            {% for s in scenarios %}
                <div
                    class="scenario-list-card"
                    style="position:relative; border-radius:12px; padding:14px; border:1px solid {% if s.id == active_id %}rgba(212,168,67,0.4){% else %}var(--border-subtle){% endif %}; background:{% if s.id == active_id %}var(--bg-card){% else %}rgba(255,255,255,0.02){% endif %};"
                >
                    <a
                        href="{{ url_for('scenarios.detail', scenario_id=s.id) }}"
                        style="position:absolute; inset:0; z-index:1;"
                        aria-label="View {{ s.title }}"
                    ></a>

                    <p style="font-size:14px; font-weight:600; color:var(--text-primary); margin:0 24px 6px 0;" class="truncate">{{ s.title }}</p>

                    <div class="flex items-center justify-between gap-2">
                        <span class="eyebrow" style="font-size:10px;">{{ s.category }}</span>
                        <span
                            class="scenario-money"
                            style="font-size:12px; font-weight:600; color:{% if s.net_monthly_impact > 0 %}var(--emerald){% elif s.net_monthly_impact < 0 %}var(--red){% else %}var(--text-secondary){% endif %};"
                            data-money-value="{{ s.net_monthly_impact }}"
                            data-money-signed="true"
                            data-money-suffix="/mo"
                        >{{ "%+.2f"|format(s.net_monthly_impact) }}/mo</span>
                    </div>

                    <form
                        method="POST"
                        action="{{ url_for('scenarios.delete', scenario_id=s.id) }}"
                        class="scenario-delete-form"
                        style="position:absolute; top:8px; right:8px; z-index:2;"
                    >
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button
                            type="submit"
                            title="Delete"
                            aria-label="Delete scenario"
                            style="background:none; border:none; color:var(--text-muted); font-size:13px; line-height:1; cursor:pointer; padding:4px;"
                        >
                            🗑️
                        </button>
                    </form>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p style="font-size:14px; color:var(--text-secondary); text-align:center; padding:32px 0;">No scenarios yet.</p>
    {% endif %}
</aside>
