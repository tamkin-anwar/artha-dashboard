{% extends "base.html" %}
{% block title %}Edit Transaction{% endblock %}
{% block content %}
<div class="glass-card" style="max-width:520px; margin:0 auto; padding:24px;">
    <div class="eyebrow" style="margin-bottom:6px;">Finance</div>
    <h1 style="font-family:'Fraunces',serif; font-size:22px; font-weight:600; color:var(--text-primary); margin:0 0 20px;">Edit Transaction</h1>

    <form method="POST" class="space-y-4" role="form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label for="description" class="sr-only">Description</label>
        <input
            type="text"
            id="description"
            name="description"
            value="{{ transaction.description }}"
            required
            autofocus
            aria-label="Transaction description"
            placeholder="Transaction description"
            class="field-input w-full"
        />

        <label for="amount" class="sr-only">Amount</label>
        <input
            type="number"
            id="amount"
            name="amount"
            value="{{ '%.2f'|format(transaction.amount) }}"
            step="0.01"
            required
            aria-label="Transaction amount"
            placeholder="Amount"
            class="field-input w-full"
            style="font-family:'JetBrains Mono',monospace;"
        />

        <label for="type" class="sr-only">Transaction Type</label>
        <select
            id="type"
            name="type"
            aria-label="Transaction type"
            class="field-input w-full"
        >
            <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>
                Income
            </option>
            <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>
                Expense
            </option>
        </select>

        <div class="flex space-x-2">
            <button
                type="submit"
                class="btn-primary flex-1"
                style="padding:10px;"
            >
                Update
            </button>

            <a
                href="{{ url_for('dashboard.index') }}"
                class="btn-secondary flex-1"
                style="padding:10px; text-align:center; text-decoration:none;"
            >
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
