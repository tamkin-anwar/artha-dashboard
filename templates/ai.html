{% extends "base.html" %}
{% block title %}AI Assistant{% endblock %}
{% block content %}

<style>
    .ai-orb {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%,
            rgba(212, 168, 67, 0.6),
            rgba(30, 58, 95, 0.8),
            rgba(10, 14, 23, 0.95));
        box-shadow:
            0 0 40px rgba(212, 168, 67, 0.2),
            0 0 80px rgba(30, 58, 95, 0.3),
            inset 0 0 40px rgba(212, 168, 67, 0.1);
        animation: orb-breathe 4s ease-in-out infinite;
        filter: blur(0.5px);
    }

    @keyframes orb-breathe {
        0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(212,168,67,0.2), 0 0 80px rgba(30,58,95,0.3); }
        50% { transform: scale(1.08); box-shadow: 0 0 60px rgba(212,168,67,0.35), 0 0 120px rgba(30,58,95,0.4); }
    }

    .ai-orb.thinking {
        animation: orb-think 1.2s ease-in-out infinite;
        background: radial-gradient(circle at 40% 40%,
            rgba(34, 197, 94, 0.5),
            rgba(212, 168, 67, 0.6),
            rgba(30, 58, 95, 0.9));
    }

    @keyframes orb-think {
        0%, 100% { transform: scale(1) rotate(0deg); }
        25% { transform: scale(1.12) rotate(2deg); }
        75% { transform: scale(1.06) rotate(-2deg); }
    }

    .ai-orb.speaking {
        animation: orb-speak 0.6s ease-out;
    }

    @keyframes orb-speak {
        0% { transform: scale(1.15); }
        60% { transform: scale(0.95); }
        100% { transform: scale(1); }
    }

    /* Smaller orb used as the inline "thinking" loading indicator once
       the conversation has started (the 120px orb only lives in the
       empty state). */
    .ai-orb.ai-orb-mini {
        width: 36px;
        height: 36px;
        margin-top: 2px;
    }

    /* Suggestion chips */
    .ai-chip {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
        font-size: 13px;
        padding: 9px 16px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.15s ease;
    }
    .ai-chip:hover {
        border-color: var(--gold);
        color: var(--text-primary);
        background: var(--gold-dim);
    }

    /* Message rows */
    .ai-row { display: flex; }
    .ai-row.user { justify-content: flex-end; }
    .ai-row.assistant { justify-content: flex-start; align-items: flex-start; gap: 10px; }

    .ai-bubble-user {
        max-width: 75%;
        background: linear-gradient(135deg, var(--gold-dim), rgba(212,168,67,0.08));
        border: 1px solid rgba(212,168,67,0.2);
        border-radius: 18px 18px 4px 18px;
        color: var(--text-primary);
        font-size: 14px;
        padding: 10px 16px;
    }

    .ai-avatar-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #f0d78a, var(--gold));
        flex-shrink: 0;
        margin-top: 4px;
    }

    .ai-bubble-assistant {
        max-width: 80%;
        color: var(--text-primary);
        font-size: 14px;
        line-height: 1.7;
        animation: ai-fade-in 0.3s ease-out;
    }
    .ai-bubble-assistant strong { color: var(--gold); }

    @keyframes ai-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .ai-word {
        display: inline-block;
        opacity: 0;
        animation: ai-word-in 0.35s ease-out forwards;
    }
    @keyframes ai-word-in {
        from { opacity: 0; transform: translateY(2px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Loading dots */
    .ai-dots { display: flex; align-items: center; gap: 4px; padding-top: 6px; }
    .ai-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--gold);
        animation: ai-dot-pulse 1.2s ease-in-out infinite;
    }
    .ai-dot:nth-child(2) { animation-delay: 0.15s; }
    .ai-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes ai-dot-pulse {
        0%, 60%, 100% { opacity: 0.25; transform: scale(0.85); }
        30% { opacity: 1; transform: scale(1); }
    }

    /* Input bar */
    .ai-input-bar {
        background: rgba(14,17,24,0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--border-subtle);
        border-radius: 0 0 16px 16px;
        display: flex;
        align-items: flex-end;
        gap: 10px;
        padding: 10px 12px;
    }
    #ai-input {
        flex: 1;
        min-width: 0;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text-primary);
        font-size: 15px;
        padding: 16px 20px;
        resize: none;
        max-height: 130px;
        line-height: 1.4;
        font-family: 'Inter', sans-serif;
    }
    #ai-input::placeholder { color: var(--text-muted); }

    .ai-insights-pill {
        background: none;
        border: none;
        color: var(--gold);
        font-size: 13px;
        white-space: nowrap;
        padding: 10px 12px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s ease;
        flex-shrink: 0;
    }
    .ai-insights-pill:hover { background: var(--gold-dim); }

    .ai-send-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--gold);
        color: #000;
        border: none;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.12s ease;
        margin-bottom: 3px;
    }
    .ai-send-btn:hover { transform: scale(1.05); }
    .ai-send-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
</style>

<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
    <div>
        <div class="eyebrow" style="margin-bottom:6px;">AI ASSISTANT</div>
        <h1 style="font-family:'Fraunces',serif; font-size:32px; font-weight:300; color:var(--text-primary); margin:0;">Artha AI</h1>
    </div>
    <button
        id="ai-clear-btn"
        type="button"
        class="btn-secondary"
        style="padding:6px 14px; font-size:13px; display:none;"
        title="Clear conversation"
    >
        Clear
    </button>
</div>

<div
    class="glass-card"
    style="display:flex; flex-direction:column; padding:0; overflow:hidden; margin-top:24px; height:calc(100vh - 190px); min-height:420px;"
    id="artha-ai-widget"
    data-csrf="{{ csrf_token() }}"
>
    <!-- Message thread -->
    <div
        id="ai-messages"
        style="flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:16px;"
        aria-live="polite"
        aria-label="AI conversation"
    >
        <div id="ai-empty-state" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center;">
            <div class="ai-orb" id="ai-orb"></div>
            <div style="font-family:'Fraunces',serif; font-size:24px; color:var(--text-primary);">Artha AI</div>
            <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:480px;">
                <button type="button" class="ai-chip" data-chip="insights">&#10022; Get financial insights</button>
                <button type="button" class="ai-chip" data-chip="spend">How much did I spend this month?</button>
                <button type="button" class="ai-chip" data-chip="savings">What's my savings rate?</button>
            </div>
        </div>
    </div>

    <!-- Input bar -->
    <div class="ai-input-bar">
        <button
            id="ai-insights-btn"
            type="button"
            class="ai-insights-pill"
        >
            &#10022; Insights
        </button>
        <textarea
            id="ai-input"
            rows="1"
            placeholder="Ask Artha anything..."
            maxlength="4000"
            autocomplete="off"
            aria-label="Message to Artha AI"
        ></textarea>
        <button
            id="ai-send-btn"
            type="button"
            class="ai-send-btn"
            aria-label="Send message"
        >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </button>
    </div>
</div>
{% endblock %}
