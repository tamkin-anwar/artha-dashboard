{% extends "base.html" %}
{% set hide_app_shell = true %}
{% block title %}Change Password{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-4 py-14 auth-bg" role="main">
    <div class="w-full max-w-md">

        <div class="flex items-center justify-center gap-2 mb-6">
            <span class="inline-flex items-center justify-center w-[66px] h-[66px]">
                <img
                    src="{{ url_for('static', filename='icons/artha-logo.png') }}"
                    alt="Artha logo"
                    class="w-full h-full object-contain drop-shadow-md"
                    loading="eager"
                />
            </span>

            <div style="font-family:'Fraunces',serif; font-size:2.25rem; font-weight:600; color:var(--gold);">
                Artha
            </div>
        </div>

        <section class="rounded-2xl p-8 shadow-xl auth-card" aria-label="Change password form">
            <h1 style="font-family:'Fraunces',serif;" class="text-center text-2xl font-semibold text-white mb-6">
                Change Password
            </h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <script type="module">
                        import { showToast } from "{{ url_for('static', filename='js/toast.js') }}";
                        document.addEventListener('DOMContentLoaded', function () {
                            {% for category, message in messages %}
                                showToast({{ message|tojson }}, {{ category|tojson }});
                            {% endfor %}
                        });
                    </script>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.change_password') }}" class="space-y-4" role="form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <label for="current_password" class="sr-only">Current Password</label>
                <input
                    id="current_password"
                    name="current_password"
                    type="password"
                    autocomplete="current-password"
                    placeholder="Current Password"
                    class="w-full px-4 py-3 rounded-lg auth-input"
                    required
                    autofocus
                />

                <label for="new_password" class="sr-only">New Password</label>
                <input
                    id="new_password"
                    name="new_password"
                    type="password"
                    autocomplete="new-password"
                    placeholder="New Password"
                    class="w-full px-4 py-3 rounded-lg auth-input"
                    required
                />

                <label for="confirm_password" class="sr-only">Confirm New Password</label>
                <input
                    id="confirm_password"
                    name="confirm_password"
                    type="password"
                    autocomplete="new-password"
                    placeholder="Confirm New Password"
                    class="w-full px-4 py-3 rounded-lg auth-input"
                    required
                />

                <button type="submit" class="w-full py-3 rounded-lg font-semibold auth-button">
                    Update Password
                </button>
            </form>

            <p class="text-center text-sm mt-5 text-slate-300">
                <a href="{{ url_for('dashboard.index') }}" class="auth-link">
                    Back to dashboard
                </a>
            </p>
        </section>
    </div>
</main>
{% endblock %}
