{% extends "base.html" %}
{% block title %}Edit Note{% endblock %}
{% block content %}
<div class="glass-card" style="max-width:480px; margin:0 auto; padding:24px;">
    <div class="eyebrow" style="text-align:center; margin-bottom:6px;">Notes</div>
    <h2 style="font-family:'Fraunces',serif; font-size:22px; font-weight:600; color:var(--text-primary); text-align:center; margin:0 0 20px;">Edit Note</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <script type="module">
            import { showToast } from "{{ url_for('static', filename='js/toast.js') }}";
            document.addEventListener('DOMContentLoaded', function () {
                {% for category, message in messages %}
                    showToast({{ message|tojson }}, {{ category|tojson }});
                {% endfor %}
            });
        </script>
    {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4" role="form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label for="note-content" class="sr-only">Note Content</label>
        <textarea
            id="note-content"
            name="content"
            rows="5"
            class="field-input w-full"
            required
            autofocus
            aria-label="Edit note content">{{ note.content }}</textarea>

        <button
            type="submit"
            class="btn-primary w-full"
            style="padding:12px;"
        >
            Save Changes
        </button>

        <a href="{{ url_for('dashboard.index') }}" style="display:block; text-align:center; font-size:14px; color:var(--text-secondary); text-decoration:none;">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
